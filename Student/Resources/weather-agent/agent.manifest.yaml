name: weather-agent
description: >
  A hosted Weather Agent that answers weather questions using a custom tool.
template:
  name: weather-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
